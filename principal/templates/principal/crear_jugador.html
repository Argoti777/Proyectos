{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'principal/style.css' %}">
    <meta charset="UTF-8">
    <title>EcuaFut</title>
</head>

<body>
    <!-- Aqui empieza nav bar -->
    {% include "principal/navbar_admin.html" %}
    <!-- Aqui termina nav bar -->

    <main class="container">
        <h1>Aqui podremos crear Ligas, equipos, jugadores</h1>
        <div>
            <form method="post" enctype="multipart/form-data" class="card p-4 shadow bg-dark text-white">
                {% csrf_token %}

                {% for field in form %}
                <div class="mb-3">
                    <label class="form-label">{{ field.label }}</label>
                    {{ field }}

                    {% if field.errors %}
                    <div class="text-danger small">
                        {{ field.errors }}
                    </div>
                    {% endif %}
                </div>
                {% endfor %}

                <button type="submit" class="btn btn-success w-100">
                    Crear jugador
                </button>
            </form>

        </div>
    </main>

    <!-- FOOTER -->
    {% include "principal/footer.html" %}
    <!-- FOOTER -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
