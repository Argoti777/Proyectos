{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Campeonato - EcuaFut</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'principal/style.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />


</head>

<body>
    {% include 'principal/navbar_admin.html' %}


    <h2>Recargar saldo</h2>

    <form method="post" class="card p-4 shadow bg-dark text-white" style="max-width:600px;">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Usuario</label>
            <select name="usuario" class="form-select" required>
                <option value="">-- Selecciona un usuario --</option>
                {% for usuario in usuarios %}
                <option value="{{ usuario.id }}">
                    {{ usuario.username }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Monto</label>
            <input type="number" step="0.01" name="monto" class="form-control" placeholder="Ingrese el monto" required>
        </div>

        <button type="submit" class="btn btn-success w-100">
            Recargar saldo
        </button>
    </form>


    {% include 'principal/footer.html' %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- jQuery (requerido por Select2) -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script>
        $(document).ready(function () {
            $('#usuario-select').select2({
                placeholder: "Buscar usuario...",
                allowClear: true,
                width: '300px'
            });
        });
    </script>



</body>

</html>
