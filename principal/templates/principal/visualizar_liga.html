{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Campeonato - EcuaFut</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'principal/style.css' %}">
</head>

<body>
    {% include 'principal/navbar_admin.html' %}

<main class="container">
    <div class="row mb-4 justify-content-center">
        <div class="col-md-6 col-lg-4">
            <form method="GET" action="{% url 'buscar2' %}">
                <div class="search-container">
                    <input type="text" name="q" id="searchInput" value="{{ query }}" placeholder="Buscar ligas...">
                    <i class="bi bi-search search-icon"></i>
                </div>
            </form>
        </div>
    </div>

    <section id="ligas">
        <h1>Ligas</h1>
        <div class="grid-container" id="ligasContainer">
            {% for liga in ligas %}
            <a href="{% url 'editar_liga' liga.id %}" class="text-decoration-none">
                <div class="custom-card" data-nombre="{{ liga.nombre|default:''|lower }}">
                    <h3>{{ liga.nombre }}</h3>
                    <p>{{ liga.ciudad }}</p>
                </div>
            </a>
            {% empty %}
            <p class="no-results" id="noLigasFound" style="display:none;">No se encontraron ligas.</p>
            <p>No hay ligas registradas.</p>
            {% endfor %}
        </div>
    </section>
</main>
    

    {% include 'principal/footer.html' %}


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
